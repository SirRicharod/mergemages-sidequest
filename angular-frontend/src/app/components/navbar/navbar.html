<!-- Main site navigation bar. Contains brand, responsive controls, search, and auth actions. -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <!-- Brand / logo: always visible and links to home -->
        <a class="navbar-brand d-flex align-items-center" routerLink="/">
            <i class="bi bi-compass me-2 d-none d-lg-inline"></i>
            SideQuest
        </a>

        <!-- Mobile auth controls: shown only on small screens (d-lg-none).
             We duplicate login/logout here so mobile users have quick access
             without opening the collapsed menu. -->
        <div class="d-flex align-items-center gap-2 ms-auto d-lg-none">
            @if (!isAuthenticated) {
                <a class="btn btn-outline-light btn-sm" routerLink="/login">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Login
                </a>
            } @else {
                <button class="btn btn-outline-light btn-sm" type="button" (click)="onLogout()">
                    <i class="bi bi-box-arrow-right me-1"></i> Log out
                </button>
            }
        </div>

        <div class="collapse navbar-collapse" id="sqNavbar">
            <!-- Primary navigation links: visible on large screens. Hidden on small screens. -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-none d-lg-flex">
                <li class="nav-item">
                    <a class="nav-link" routerLink="/quests" routerLinkActive="active">Ongoing Quests</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/profile" routerLinkActive="active">Profile</a>
                </li>
            </ul>

            <!-- Desktop auth controls: visible on large screens (d-none d-lg-flex).
                 Separate from mobile controls to match the horizontal layout and show username. -->
            @if (!isAuthenticated) {
                <div class="d-none d-lg-flex align-items-center gap-2 ms-auto">
                    <a class="btn btn-outline-light btn-sm" routerLink="/login">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Login
                    </a>
                </div>
            } @else {
                <div class="d-none d-lg-flex align-items-center gap-2 ms-auto">
                    <button class="btn btn-outline-light btn-sm" (click)="onLogout()">
                        <i class="bi bi-box-arrow-right me-1"></i> Log out
                    </button>
                    <!-- Display username on desktop for context next to auth action -->
                    <span class="navbar-text small text-white-50">
                        {{ username || 'You' }}
                    </span>
                </div>
            }
        </div>
    </div>
</nav>
